# /etc/nginx/sites-available/stock.modulgroup.uz
# ln -s /etc/nginx/sites-available/stock.modulgroup.uz /etc/nginx/sites-enabled/
#
# Run `certbot --nginx -d stock.modulgroup.uz` AFTER this file is in place
# and the DNS A record is live. certbot will rewrite this file to add the
# TLS listener on 443.

server {
    listen 80;
    listen [::]:80;
    server_name stock.modulgroup.uz;

    # Reasonable client timeouts (yfinance+SEC fetches can be slow)
    client_max_body_size 1m;
    proxy_connect_timeout 30s;
    proxy_send_timeout    120s;
    proxy_read_timeout    120s;

    # Optional: basic rate-limit (uncomment if you want it)
    # limit_req_zone $binary_remote_addr zone=stock:10m rate=30r/m;
    # limit_req zone=stock burst=20 nodelay;

    access_log /var/log/nginx/stock.modulgroup.uz.access.log;
    error_log  /var/log/nginx/stock.modulgroup.uz.error.log;

    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
