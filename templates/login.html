<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Stock Screener — Login</title>
<style>
  :root {
    --bg: #0e1116;
    --panel: #161b22;
    --panel2: #1c232d;
    --border: #2a313a;
    --text: #e6edf3;
    --muted: #8b949e;
    --accent: #3aa0ff;
    --red: #e74c3c;
    --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
            "Helvetica Neue", Arial, sans-serif;
  }
  * { box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 32px 28px;
    width: 100%;
    max-width: 340px;
  }
  h1 {
    margin: 0 0 4px;
    font-size: 20px;
  }
  .sub {
    color: var(--muted);
    font-size: 13px;
    margin-bottom: 24px;
  }
  label {
    display: block;
    font-size: 12px;
    color: var(--muted);
    margin: 0 0 6px;
  }
  input[type="password"] {
    width: 100%;
    background: var(--panel2);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 9px 10px;
    font-size: 14px;
    font-family: inherit;
  }
  input[type="password"]:focus {
    outline: none;
    border-color: var(--accent);
  }
  .check {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 14px;
    font-size: 13px;
    color: var(--muted);
    cursor: pointer;
  }
  .check input { cursor: pointer; }
  .btn {
    display: block;
    width: 100%;
    margin-top: 18px;
    background: var(--accent);
    color: #0b1320;
    border: none;
    padding: 10px 16px;
    border-radius: 6px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
  }
  .btn:hover { filter: brightness(1.1); }
  .err {
    background: #3b1e20;
    border: 1px solid #7a3838;
    color: #ffb5b5;
    padding: 9px 12px;
    border-radius: 6px;
    font-size: 13px;
    margin-bottom: 16px;
  }
</style>
</head>
<body>
<div class="card">
  <h1>Stock Screener</h1>
  <div class="sub">Enter your password to continue.</div>

  {% if error %}
  <div class="err">{{ error }}</div>
  {% endif %}

  <form method="POST" action="/login">
    <label for="password">Password</label>
    <input id="password" name="password" type="password"
           autofocus autocomplete="current-password" />

    <label class="check">
      <input type="checkbox" name="remember" value="1" />
      Remember me for 30 days
    </label>

    <button class="btn" type="submit">Sign in</button>
  </form>
</div>
</body>
</html>
