<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Stock Screener — Penny / Growth / Value</title>
<style>
  :root {
    --bg: #0e1116;
    --panel: #161b22;
    --panel2: #1c232d;
    --border: #2a313a;
    --text: #e6edf3;
    --muted: #8b949e;
    --accent: #3aa0ff;
    --green: #2ecc71;
    --yellow: #f1c40f;
    --red: #e74c3c;
    --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
            "Helvetica Neue", Arial, sans-serif;
  }
  * { box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    margin: 0;
    padding: 24px;
  }
  h1 { margin: 0 0 4px; font-size: 22px; }
  .sub { color: var(--muted); font-size: 13px; margin-bottom: 20px; }

  .layout { display: grid; grid-template-columns: 340px 1fr; gap: 20px; }
  @media (max-width: 920px) { .layout { grid-template-columns: 1fr; } }

  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
  }
  .panel h2 {
    font-size: 13px; text-transform: uppercase; letter-spacing: 0.08em;
    color: var(--muted); margin: 0 0 12px; font-weight: 600;
  }
  label { display: block; font-size: 12px; color: var(--muted);
          margin: 12px 0 4px; }
  input[type="text"], input[type="number"], select {
    width: 100%;
    background: var(--panel2);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 10px;
    font-size: 14px;
    font-family: inherit;
  }
  input[type="text"]:focus, select:focus, input[type="number"]:focus {
    outline: none; border-color: var(--accent);
  }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .check { display: flex; align-items: center; gap: 6px; margin-top: 12px; }
  .check input { transform: translateY(1px); }

  .btn {
    display: inline-block;
    margin-top: 16px;
    background: var(--accent);
    color: #0b1320;
    border: none;
    padding: 10px 16px;
    border-radius: 6px;
    font-size: 14px; font-weight: 600;
    cursor: pointer;
  }
  .btn:hover { filter: brightness(1.1); }
  .btn.secondary {
    background: transparent; color: var(--accent);
    border: 1px solid var(--accent);
  }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-row { display: flex; gap: 8px; }

  .hint {
    font-size: 11px; color: var(--muted); margin-top: 2px;
  }

  .results-empty { color: var(--muted); font-size: 14px; }

  .meta { display: flex; gap: 20px; flex-wrap: wrap; margin-bottom: 14px; }
  .meta-item { font-size: 13px; }
  .meta-item b { display: block; color: var(--muted); font-weight: 500;
                 font-size: 11px; text-transform: uppercase;
                 letter-spacing: 0.06em; margin-bottom: 2px; }

  .verdict-block {
    display: flex; gap: 20px; align-items: center;
    padding: 14px; border-radius: 8px;
    background: var(--panel2); border: 1px solid var(--border);
    margin-bottom: 16px;
  }
  .verdict-label { font-size: 24px; font-weight: 700; }
  .score-big { font-size: 28px; font-weight: 700; }
  .score-max { color: var(--muted); font-size: 16px; }

  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th, td {
    padding: 8px 10px;
    border-bottom: 1px solid var(--border);
    text-align: left;
    vertical-align: top;
  }
  th {
    color: var(--muted); font-weight: 500;
    text-transform: uppercase; letter-spacing: 0.06em;
    font-size: 11px;
  }
  td.status-pass { color: var(--green); white-space: nowrap; }
  td.status-neutral { color: var(--yellow); white-space: nowrap; }
  td.status-fail { color: var(--red); white-space: nowrap; }
  td.num { text-align: right; font-variant-numeric: tabular-nums; }

  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 12px;
    font-size: 11px;
    background: var(--panel2);
    border: 1px solid var(--border);
    color: var(--muted);
  }
  .badge.auto { border-color: var(--accent); color: var(--accent); }
  .section-h {
    font-size: 12px; text-transform: uppercase; letter-spacing: 0.08em;
    color: var(--muted); margin: 18px 0 8px;
  }

  pre.raw {
    background: #0b0e12; border: 1px solid var(--border);
    border-radius: 6px; padding: 12px;
    font-size: 11px; overflow: auto; max-height: 400px;
    color: #cfd6dc;
  }
  details summary { cursor: pointer; color: var(--muted); font-size: 12px; }

  .err {
    background: #3b1e20; border: 1px solid #7a3838; color: #ffb5b5;
    padding: 10px; border-radius: 6px; font-size: 13px; margin-top: 10px;
    white-space: pre-wrap;
  }

  .spinner {
    display: inline-block;
    width: 14px; height: 14px;
    border: 2px solid var(--muted);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    vertical-align: middle;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .frameworks-grid {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px;
  }
  @media (max-width: 920px) {
    .frameworks-grid { grid-template-columns: 1fr; }
  }
  .fw-card {
    background: var(--panel2); border: 1px solid var(--border);
    border-radius: 8px; padding: 12px;
  }
  .fw-card h3 { margin: 0 0 6px; font-size: 13px;
                text-transform: uppercase; letter-spacing: 0.06em; }
  .fw-card.suggested { border-color: var(--accent); }
  .fw-suggested-tag {
    font-size: 10px; color: var(--accent); margin-left: 6px;
  }

  /* Insider panel */
  .insider-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 4px;
  }
  @media (max-width: 700px) { .insider-grid { grid-template-columns: 1fr; } }
  .insider-period {
    background: var(--panel2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
  }
  .insider-period h4 {
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em;
    color: var(--muted); margin: 0 0 8px; font-weight: 600;
  }
  .ins-row { display: flex; align-items: center; gap: 8px; margin: 4px 0; }
  .ins-label { font-size: 12px; width: 36px; flex-shrink: 0; }
  .ins-bar-wrap {
    flex: 1; height: 8px; background: var(--border); border-radius: 4px;
    overflow: hidden;
  }
  .ins-bar { height: 100%; border-radius: 4px; transition: width 0.4s; }
  .ins-bar.buy  { background: var(--green); }
  .ins-bar.sell { background: var(--red); }
  .ins-amt { font-size: 11px; color: var(--muted); white-space: nowrap; }
  .ins-count { font-size: 10px; color: var(--muted); }
  .insider-loading { color: var(--muted); font-size: 12px; }
  .ins-signal {
    margin-top: 8px; font-size: 11px; font-weight: 600; text-align: center;
  }
  .ins-signal.bullish { color: var(--green); }
  .ins-signal.bearish { color: var(--red); }
  .ins-signal.neutral { color: var(--muted); }

  /* Valuation panel */
  .val-card {
    background: var(--panel2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
    margin-bottom: 16px;
  }
  .val-header {
    display: flex; align-items: flex-start; gap: 16px;
    flex-wrap: wrap; margin-bottom: 10px;
  }
  .val-consensus { font-size: 22px; font-weight: 700; }
  .val-counts    { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .val-asmp      { font-size: 11px; color: var(--muted); line-height: 1.7; }
  .val-implied   { font-size: 12px; margin-top: 4px; }
  .val-roic      { font-size: 11px; margin-top: 3px; }
  .mc-range {
    position: relative; height: 8px;
    background: var(--border); border-radius: 4px;
    min-width: 90px; display: inline-block; width: 100%;
  }
  .mc-iqr   { position: absolute; height: 100%; background: var(--accent);
              opacity: 0.35; border-radius: 4px; }
  .mc-median, .mc-price {
    position: absolute; width: 2px; height: 100%; border-radius: 2px;
  }
  .mc-median { background: var(--accent); }
  .mc-price  { background: var(--red); }
  .mc-lbl    { font-size: 10px; color: var(--muted); margin-top: 2px; }
  .val-loading { color: var(--muted); font-size: 12px; }

  /* Superinvestors table */
  .super-wrap { overflow-x: auto; margin-top: 4px; }
  .super-wrap table { width: 100%; min-width: 480px; }
  .super-wrap td, .super-wrap th { padding: 7px 10px; }
  .super-wrap tr.buy-row  td:nth-child(3) { color: var(--green); }
  .super-wrap tr.sell-row td:nth-child(3) { color: var(--red); }
  .super-wrap tr.hold-row td:nth-child(3) { color: var(--muted); }
  .super-wrap tfoot tr td { border-top: 2px solid var(--border);
    font-weight: 600; font-size: 12px; }
  .super-wrap tfoot .bought { color: var(--green); }
  .super-wrap tfoot .sold   { color: var(--red); }
</style>
</head>
<body>

<h1>Stock Screener — Penny / Growth / Value</h1>
<div class="sub">
  Auto-routes a ticker to the right 10-filter framework by market cap.
  All options are editable. Preview locally before deploy.
</div>

<div class="layout">

  <!-- ============ LEFT: controls ============ -->
  <form id="form" class="panel" onsubmit="return false;">
    <h2>Query</h2>

    <label for="ticker">Ticker</label>
    <input id="ticker" type="text" placeholder="AAPL" autocomplete="off" />

    <label for="framework">Framework</label>
    <select id="framework">
      <option value="auto">Auto (by market cap)</option>
      <option value="penny">Penny</option>
      <option value="growth">Growth</option>
      <option value="value">Value</option>
    </select>
    <div id="fw-hint" class="hint"></div>

    <label for="profile">Profile (weighting)</label>
    <select id="profile"></select>

    <label for="sector">Sector overlay</label>
    <select id="sector">
      <option value="auto">Auto-detect</option>
      <option value="none">None (pure profile)</option>
    </select>

    <div class="row">
      <div>
        <label for="scoring_mode">Scoring mode</label>
        <select id="scoring_mode">
          <option value="strict">strict</option>
          <option value="normal" selected>normal</option>
          <option value="generous">generous</option>
        </select>
      </div>
      <div>
        <label for="engine">Sentiment engine</label>
        <select id="engine">
          <option value="auto">auto</option>
          <option value="keyword">keyword</option>
          <option value="finbert">finbert</option>
          <option value="claude">claude</option>
        </select>
      </div>
    </div>

    <div class="row">
      <div>
        <label for="lang">Language</label>
        <select id="lang">
          <option value="en">en</option>
          <option value="uz">uz</option>
        </select>
      </div>
      <div>
        <label for="news_days">News window (days)</label>
        <input id="news_days" type="number" placeholder="365" min="1" />
      </div>
    </div>

    <label for="filing_days">Filings window (days, penny only)</label>
    <input id="filing_days" type="number" placeholder="30" min="1" />

    <div class="check">
      <input id="apply_bonuses" type="checkbox" checked />
      <label for="apply_bonuses" style="margin: 0;">Apply bonus rules</label>
    </div>

    <div class="btn-row">
      <button id="btn-run" class="btn" type="button">Run</button>
      <button id="btn-clear-cache" class="btn secondary" type="button"
              title="Flush cached ticker data (yfinance / SEC).">
        Clear cache
      </button>
    </div>
    <div id="cache-stats" class="hint" style="margin-top:6px;"></div>
  </form>

  <!-- ============ RIGHT: results ============ -->
  <div class="panel" id="results-panel">
    <h2>Result</h2>
    <div id="results" class="results-empty">
      Enter a ticker and click Run. Evaluation takes 5–15 s
      (live yfinance + SEC EDGAR fetches).
    </div>
  </div>
</div>

<script>
let CONFIG = null;

async function loadConfig() {
  const r = await fetch("/api/config");
  CONFIG = await r.json();
  onFrameworkChange();
}

function $(id) { return document.getElementById(id); }

function setOptions(sel, values, keep) {
  const cur = keep ? sel.value : null;
  const toKeep = Array.from(sel.querySelectorAll("option[data-sticky='1']"));
  sel.innerHTML = "";
  toKeep.forEach(o => sel.appendChild(o));
  values.forEach(v => {
    const o = document.createElement("option");
    o.value = v; o.textContent = v;
    sel.appendChild(o);
  });
  if (cur && Array.from(sel.options).some(o => o.value === cur)) {
    sel.value = cur;
  }
}

function onFrameworkChange() {
  if (!CONFIG) return;
  const fw = $("framework").value;
  const profSel = $("profile");
  const secSel = $("sector");

  // Sticky sector options
  Array.from(secSel.querySelectorAll("option")).forEach(o => {
    if (o.value === "auto" || o.value === "none") {
      o.setAttribute("data-sticky", "1");
    }
  });

  if (fw === "auto") {
    // Show the union — server falls back to 'balanced' if the picked
    // profile/sector isn't valid for the resolved framework.
    const profs = new Set(), secs = new Set();
    Object.values(CONFIG.frameworks).forEach(m => {
      m.profiles.forEach(p => profs.add(p));
      m.sectors.forEach(s => secs.add(s));
    });
    setOptions(profSel, [...profs]);
    setOptions(secSel, [...secs], true);
    $("fw-hint").textContent =
      "Dispatcher picks penny / growth / value by market cap.";
  } else {
    const meta = CONFIG.frameworks[fw];
    setOptions(profSel, meta.profiles);
    setOptions(secSel, meta.sectors, true);
    $("fw-hint").textContent =
      `${meta.label} — cap range: ${meta.cap_hint}`;
  }
  // Default profile = "balanced" if present
  if (Array.from(profSel.options).some(o => o.value === "balanced")) {
    profSel.value = "balanced";
  }
}

function gatherPayload() {
  return {
    ticker:        $("ticker").value.trim().toUpperCase(),
    framework:     $("framework").value,
    profile:       $("profile").value,
    sector:        $("sector").value,
    scoring_mode:  $("scoring_mode").value,
    engine:        $("engine").value,
    lang:          $("lang").value,
    news_days:     $("news_days").value ? parseInt($("news_days").value) : null,
    filing_days:   $("filing_days").value ? parseInt($("filing_days").value) : null,
    apply_bonuses: $("apply_bonuses").checked,
  };
}

function statusClass(s) {
  if (!s) return "";
  if (s.includes("PASS") || s.includes("🟢")) return "status-pass";
  if (s.includes("NEUTRAL") || s.includes("🟡")) return "status-neutral";
  if (s.includes("FAIL") || s.includes("🔴")) return "status-fail";
  return "";
}

function moneyFmt(n) {
  if (n == null) return "n/a";
  if (n >= 1e12) return "$" + (n / 1e12).toFixed(2) + "T";
  if (n >= 1e9)  return "$" + (n / 1e9).toFixed(2)  + "B";
  if (n >= 1e6)  return "$" + (n / 1e6).toFixed(2)  + "M";
  return "$" + n.toLocaleString();
}

function renderRun(data, selectedProfile) {
  const snap = data.snapshot || {};
  const fwUsed = data.framework_used;
  const profiles = data.profiles || {};

  // Determine the "primary" profile to show per-filter breakdown for.
  // If the requested profile wasn't run (e.g. invalid for resolved framework),
  // fall back to balanced, then to the top-scoring profile.
  const ranked = Object.entries(profiles)
    .filter(([_, r]) => !r.error)
    .sort((a, b) => (b[1]?.result?.score ?? -1) - (a[1]?.result?.score ?? -1));

  let primaryKey = selectedProfile;
  let fallbackNote = "";
  if (!profiles[primaryKey] || profiles[primaryKey].error) {
    if (profiles.balanced && !profiles.balanced.error) {
      primaryKey = "balanced";
      fallbackNote = `Profile "${selectedProfile}" is not valid for the ` +
        `${fwUsed.toUpperCase()} framework — showing breakdown for ` +
        `<b>balanced</b> instead.`;
    } else if (ranked.length) {
      primaryKey = ranked[0][0];
    }
  }

  const primary = profiles[primaryKey]?.result || {};
  const primaryResults = primary.results || [];

  // Top verdict table — all profiles sorted by score
  const profRows = ranked.map(([prof, run]) => {
    const r = run.result || {};
    const cls = statusClass(r.verdict || "");
    const veto = (r.vetoes_triggered || []).length
      ? `<span class="badge" style="border-color:var(--red);color:var(--red);">veto</span>`
      : "";
    const bonusPts = (r.bonuses_applied || [])
      .reduce((s, b) => s + (b.points || 0), 0);
    const bonus = bonusPts
      ? `<span class="badge">+${bonusPts}</span>` : "";
    const activeMark = prof === primaryKey
      ? `<span class="badge auto" style="margin-left:6px;">primary</span>` : "";
    return `<tr class="prof-row" data-prof="${prof}"
              style="${prof === primaryKey ? 'background:var(--panel2);' : ''}
                     cursor:pointer;">
      <td><b>${prof}</b>${activeMark}</td>
      <td class="${cls}">${r.verdict || "—"}</td>
      <td class="num">${r.score ?? "—"}</td>
      <td class="num">${r.pass_count ?? "—"}/10</td>
      <td>${veto} ${bonus}</td>
    </tr>`;
  }).join("");

  const errorRows = Object.entries(profiles)
    .filter(([_, r]) => r.error)
    .map(([prof, run]) => `<tr>
      <td><b>${prof}</b></td>
      <td colspan="4" class="status-fail">${run.error}</td>
    </tr>`).join("");

  // Per-filter breakdown for primary profile
  const filterRows = primaryResults.map(r => `
    <tr>
      <td>${r.id}</td>
      <td>${r.name || ""}</td>
      <td class="${statusClass(r.status)}">${r.status || ""}</td>
      <td class="num">${r.earned ?? ""}/${r.weight ?? ""}</td>
      <td>${(r.note || "").replace(/</g, "&lt;")}</td>
    </tr>
  `).join("");

  const primaryBonuses = (primary.bonuses_applied || []).map(b =>
    `<span class="badge">+${b.points} ${b.name}</span>`).join(" ");
  const primaryVetoes = (primary.vetoes_triggered || []).map(v =>
    `<span class="badge" style="border-color: var(--red); color: var(--red);">
      veto: ${v.name || v}
     </span>`).join(" ");

  return `
    <div class="meta">
      <div class="meta-item"><b>Ticker</b>${data.ticker}</div>
      <div class="meta-item"><b>Name</b>${snap.name || "—"}</div>
      <div class="meta-item"><b>Price</b>
        <span style="font-size:16px;font-weight:700;color:var(--text);">
          ${snap.price ? (snap.currency && snap.currency !== "USD" ? snap.currency + " " : "$") + snap.price.toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2}) : "—"}
        </span>
      </div>
      <div class="meta-item"><b>Market Cap</b>${moneyFmt(snap.market_cap)}
        <span class="badge" style="margin-left:6px;">${snap.market_cap_band}</span>
      </div>
      <div class="meta-item"><b>Sector</b>${snap.sector || "—"}</div>
      <div class="meta-item"><b>Framework</b>${fwUsed.toUpperCase()}
        <span class="badge ${data.framework_auto_detected ? "auto" : ""}">
          ${data.framework_auto_detected ? "auto" : "forced"}
        </span>
      </div>
    </div>

    ${fallbackNote
      ? `<div class="hint" style="background:var(--panel2);
           padding:8px 10px;border-radius:6px;margin-bottom:10px;">
           ${fallbackNote}</div>` : ""}

    <div class="section-h">Intrinsic Value
      <span class="hint" style="text-transform:none;letter-spacing:0;">
        (DCF · Buffett · Graham · EV/EBITDA · Monte Carlo)</span></div>
    <div id="valuation-slot">
      <div class="val-loading"><span class="spinner"></span> Running valuation models…</div>
    </div>

    <div class="section-h">Verdicts across all ${fwUsed.toUpperCase()} profiles
      <span class="hint">(click a row to swap the breakdown below)</span></div>
    <table>
      <thead><tr>
        <th>Profile</th><th>Verdict</th><th>Score</th>
        <th>Passes</th><th>Flags</th>
      </tr></thead>
      <tbody>${profRows}${errorRows}</tbody>
    </table>

    <div class="section-h">
      Per-filter breakdown — <span style="color:var(--accent);">${primaryKey}</span>
    </div>
    ${primaryBonuses ? `<div style="margin-bottom:8px;">
      <span class="hint">Bonuses:</span> ${primaryBonuses}</div>` : ""}
    ${primaryVetoes ? `<div style="margin-bottom:8px;">
      <span class="hint">Vetoes:</span> ${primaryVetoes}</div>` : ""}
    <table>
      <thead><tr>
        <th>ID</th><th>Filter</th><th>Status</th>
        <th>Earned/Weight</th><th>Note</th>
      </tr></thead>
      <tbody>${filterRows}</tbody>
    </table>

    <div class="section-h">Insider activity
      <span class="hint" style="text-transform:none;letter-spacing:0;">
        (source: dataroma.com)</span></div>
    <div id="insider-slot">
      <div class="insider-loading">
        <span class="spinner"></span> Fetching insider trades…
      </div>
    </div>

    <div class="section-h">Superinvestor ownership
      <span class="hint" style="text-transform:none;letter-spacing:0;">
        (source: dataroma.com)</span></div>
    <div id="super-slot">
      <div class="insider-loading">
        <span class="spinner"></span> Fetching superinvestor holdings…
      </div>
    </div>

    <details style="margin-top:14px;">
      <summary>Raw JSON</summary>
      <pre class="raw">${JSON.stringify(data, null, 2)
        .replace(/</g, "&lt;")}</pre>
    </details>
  `;
}

// ── Valuation panel ──────────────────────────────────────────────────────────

function verdictColor(v) {
  if (!v || v === "N/A") return "var(--muted)";
  if (v === "Undervalued" || v === "Slight Upside") return "var(--green)";
  if (v === "Overvalued"  || v === "Slight Downside") return "var(--red)";
  return "var(--yellow)";
}

function pctVsPrice(fair, price) {
  if (fair == null || !price) return "";
  const d = ((fair - price) / price) * 100;
  return (d >= 0 ? "+" : "") + d.toFixed(1) + "%";
}

function renderValuation(data) {
  if (!data || data.error) {
    return `<div class="val-loading" style="color:var(--red);">
      ${data ? data.error : "Valuation unavailable"}</div>`;
  }
  const p      = data.current_price;
  const asmp   = data.assumptions || {};
  const macro  = data.macro || {};
  const counts = data.consensus_counts || {};
  const cc        = verdictColor(data.consensus);
  const ig        = data.implied_growth;
  const simpleMode = data.simple_mode === true;

  // ── Consensus header ──────────────────────────────────────────────────
  const igHtml = ig != null
    ? `<div class="val-implied">Reverse-DCF implied growth:
         <b style="color:${ig > asmp.growth_blended ? 'var(--yellow)' : 'var(--green)'}">
           ${(ig*100).toFixed(1)}%</b>
         <span style="color:var(--muted);font-size:10px;">
           (blended ${(asmp.growth_blended*100).toFixed(1)}%)</span></div>` : "";

  const roicSignalColor = asmp.roic != null && asmp.cost_of_equity != null
    ? (asmp.roic > asmp.cost_of_equity ? "var(--green)" : "var(--red)") : "var(--muted)";
  const roicHtml = asmp.roic_signal
    ? `<div class="val-roic">ROIC ${asmp.roic != null ? (asmp.roic*100).toFixed(1)+"% — " : ""}
         <span style="color:${roicSignalColor}">${asmp.roic_signal}</span></div>` : "";

  const fcfHtml = asmp.fcf_normalized
    ? `<div style="font-size:10px;color:var(--muted);margin-top:2px;">
         FCF (3y avg) ${moneyShort(asmp.fcf_normalized)}</div>` : "";

  // Financial subsector alert
  const subHtml = (data.financial_subsector && data.financial_subsector !== "NOT_FINANCIAL")
    ? `<div style="margin-top:6px;font-size:11px;padding:4px 8px;
         background:rgba(241,196,15,0.12);border:1px solid rgba(241,196,15,0.3);
         border-radius:4px;color:var(--yellow);">
         ⚑ Financial firm: ${data.financial_subsector}
         ${data.financial_reliability ? ` — reliability: ${data.financial_reliability}` : ""}
       </div>` : "";

  // ── Macro + WACC breakdown ─────────────────────────────────────────────
  const macroHtml = `
    <div class="val-asmp">
      Rf <b>${macro.rf != null ? (macro.rf*100).toFixed(2)+"%" : "—"}</b>
        <span style="color:var(--muted);font-size:10px;">(${macro.source_rf || ""})</span>
      &nbsp;·&nbsp;ERP <b>${macro.erp != null ? (macro.erp*100).toFixed(2)+"%" : "—"}</b>
        <span style="color:var(--muted);font-size:10px;">(${macro.source_erp || ""})</span><br>
      β <b>${asmp.beta_raw?.toFixed(2)}</b>→<b>${asmp.beta_adjusted?.toFixed(2)}</b>
        <span style="color:var(--muted);font-size:10px;">(Blume-adj)</span>
      &nbsp;·&nbsp;ke <b>${asmp.cost_of_equity != null ? (asmp.cost_of_equity*100).toFixed(1)+"%" : "—"}</b>
      &nbsp;kd <b>${asmp.cost_of_debt != null ? (asmp.cost_of_debt*100).toFixed(1)+"%" : "—"}</b><br>
      E/V <b>${asmp.equity_weight != null ? (asmp.equity_weight*100).toFixed(0)+"%" : "—"}</b>
      &nbsp;D/V <b>${asmp.debt_weight != null ? (asmp.debt_weight*100).toFixed(0)+"%" : "—"}</b>
      &nbsp;tax <b>${asmp.tax_rate != null ? (asmp.tax_rate*100).toFixed(1)+"%" : "—"}</b>
      &nbsp;→&nbsp;WACC <b>${asmp.wacc != null ? (asmp.wacc*100).toFixed(2)+"%" : "—"}</b><br>
      Terminal g <b>${asmp.terminal_g != null ? (asmp.terminal_g*100).toFixed(2)+"%" : "—"}</b>
        <span style="color:var(--muted);font-size:10px;">(≤ GDP ${macro.long_run_gdp != null ? (macro.long_run_gdp*100).toFixed(1)+"%" : ""})</span>
      &nbsp;·&nbsp;Exit P/E <b>${asmp.future_pe?.toFixed(1)}</b>
      &nbsp;·&nbsp;MoS <b>${asmp.margin_of_safety != null ? (asmp.margin_of_safety*100).toFixed(0)+"%" : "—"}</b>
    </div>`;

  // ── Growth rate sources ────────────────────────────────────────────────
  const gSources = [
    ["SGR",          asmp.growth_fundamental_sgr],
    ["ROIC×reinvest",asmp.growth_roic_reinvest],
    ["Hist EPS",     asmp.growth_historical_eps],
    ["Hist FCF",     asmp.growth_historical_fcf],
    ["Analyst",      asmp.growth_analyst],
    ["Blended",      asmp.growth_blended],
  ].filter(([, v]) => v != null)
   .map(([lbl, v]) =>
     `<span style="margin-right:8px;"><span style="color:var(--muted);font-size:10px;">${lbl}</span>
      <b>${(v*100).toFixed(1)}%</b></span>`).join("");

  // Bayesian growth posterior table
  let posteriorHtml = "";
  const gp = asmp.growth_posterior;
  if (gp && gp.n_sources > 0) {
    const srcRows = gp.sources.map(s =>
      `<tr>
        <td style="color:var(--muted);">${s.name}</td>
        <td class="num">${(s.mean*100).toFixed(1)}%</td>
        <td class="num">${(s.sigma*100).toFixed(1)}%</td>
        <td class="num">${(s.weight*100).toFixed(0)}%</td>
       </tr>`).join("");
    posteriorHtml = `
      <details style="margin-top:8px;">
        <summary style="font-size:11px;color:var(--muted);cursor:pointer;">
          Growth posterior (Bayesian IV-weighted, ${gp.n_sources} sources)
          — μ <b>${(gp.mu*100).toFixed(1)}%</b> σ <b>${(gp.sigma*100).toFixed(1)}%</b>
        </summary>
        <table style="font-size:11px;margin-top:6px;">
          <thead><tr><th>Source</th><th>Mean</th><th>σ</th><th>Weight</th></tr></thead>
          <tbody>${srcRows}</tbody>
          <tfoot><tr>
            <td><b>Posterior</b></td>
            <td class="num"><b>${(gp.mu*100).toFixed(1)}%</b></td>
            <td class="num"><b>${(gp.sigma*100).toFixed(1)}%</b></td>
            <td></td>
          </tr></tfoot>
        </table>
      </details>`;
  }

  // ── Methods table ─────────────────────────────────────────────────────
  const methods = data.methods || {};
  const methodRows = Object.entries(methods).map(([key, m]) => {
    const isMC = key === "monte_carlo";
    const val  = m.value;
    const vc   = verdictColor(m.verdict);

    if (isMC) {
      const lo = m.p10, hi = m.p90, med = m.p50;
      const span = Math.max(hi - lo, 1);
      const iqrL = Math.max(0, ((m.p25 - lo) / span) * 100);
      const iqrW = Math.min(100, ((m.p75 - m.p25) / span) * 100);
      const medP = Math.max(0, Math.min(99, ((med - lo) / span) * 100));
      const curP = Math.max(0, Math.min(99, ((p   - lo) / span) * 100));
      return `<tr>
        <td style="color:var(--muted);font-size:11px;">${m.name}</td>
        <td class="num">$${med?.toFixed(2) ?? "—"}</td>
        <td>
          <div class="mc-range">
            <div class="mc-iqr"    style="left:${iqrL}%;width:${iqrW}%;"></div>
            <div class="mc-median" style="left:${medP}%;"></div>
            <div class="mc-price"  style="left:${curP}%;" title="Current price $${p.toFixed(2)}"></div>
          </div>
          <div class="mc-lbl">P10 $${lo?.toFixed(0)} – P90 $${hi?.toFixed(0)}</div>
        </td>
        <td style="color:${vc};white-space:nowrap;font-size:11px;">${m.verdict}</td>
        <td class="num" style="color:${vc};font-size:11px;">${pctVsPrice(med, p)}</td>
      </tr>`;
    }

    const noteHtml = m.note
      ? `<div style="font-size:10px;color:var(--muted);">${m.note}</div>` : "";
    const relHtml  = m.reliability && m.reliability !== "High"
      ? `<div style="font-size:10px;color:${m.reliability==="Flag"?"var(--red)":"var(--yellow)"};">
           ${m.reliability}</div>` : "";
    const buyHtml  = m.buy_price
      ? `<div style="font-size:10px;color:var(--muted);">buy ≤ $${m.buy_price.toFixed(2)}</div>` : "";
    const gBdg     = m.growth_used != null
      ? `<div style="font-size:10px;color:var(--muted);">${(m.growth_used*100).toFixed(1)}% g</div>` : "";

    return `<tr>
      <td style="color:var(--muted);font-size:11px;">${m.name}${noteHtml}${relHtml}</td>
      <td class="num">${val != null ? "$"+val.toFixed(2) : "N/A"}${buyHtml}</td>
      <td>${gBdg}</td>
      <td style="color:${vc};white-space:nowrap;font-size:11px;">${m.verdict}</td>
      <td class="num" style="color:${vc};font-size:11px;">${pctVsPrice(val, p)}</td>
    </tr>`;
  }).join("");

  // ── Sensitivity table ─────────────────────────────────────────────────
  let sensHtml = "";
  const sens = data.sensitivity;
  if (sens && sens.values) {
    const allVals = sens.values.flat().filter(v => v != null && !isNaN(v));
    const minV = Math.min(...allVals), maxV = Math.max(...allVals);
    const span  = Math.max(maxV - minV, 1);
    const hdrCols = sens.tg_labels.map(lbl =>
      `<th style="font-size:10px;">${lbl}</th>`).join("");
    const bodyRows = sens.values.map((row, ri) => {
      const cells = row.map(v => {
        if (v == null || isNaN(v)) return `<td style="color:var(--muted);text-align:right;font-size:10px;">N/A</td>`;
        const ratio = p > 0 ? v / p : 1;
        const bg = ratio >= 1.30 ? "rgba(46,204,113,0.20)"
                 : ratio >= 1.10 ? "rgba(46,204,113,0.10)"
                 : ratio >= 0.90 ? "transparent"
                 : ratio >= 0.70 ? "rgba(231,76,60,0.10)"
                 :                 "rgba(231,76,60,0.20)";
        return `<td style="text-align:right;font-size:10px;background:${bg};">$${v.toFixed(2)}</td>`;
      }).join("");
      return `<tr><td style="color:var(--muted);font-size:10px;">${sens.wacc_labels[ri]}</td>${cells}</tr>`;
    }).join("");
    sensHtml = `
      <details style="margin-top:10px;">
        <summary style="font-size:11px;color:var(--muted);cursor:pointer;">
          Sensitivity table — fair value vs WACC × terminal g (green=undervalued, red=overvalued vs $${p.toFixed(2)})
        </summary>
        <div style="overflow-x:auto;margin-top:6px;">
          <table style="font-size:10px;border-collapse:collapse;">
            <thead><tr>
              <th style="font-size:10px;color:var(--muted);">WACC↓ / g→</th>
              ${hdrCols}
            </tr></thead>
            <tbody>${bodyRows}</tbody>
          </table>
        </div>
      </details>`;
  }

  // ── Data warnings & assumption notes ──────────────────────────────────
  const warnings = data.data_warnings || [];
  const notes    = data.assumption_notes || [];
  const diagHtml = (warnings.length + notes.length) > 0
    ? `<details style="margin-top:10px;">
        <summary style="font-size:11px;color:var(--muted);cursor:pointer;">
          Diagnostics (${warnings.length} warnings, ${notes.length} notes)
        </summary>
        ${warnings.map(w => `<div style="font-size:10px;color:var(--red);margin-top:3px;">⚠ ${w}</div>`).join("")}
        ${notes.map(n => `<div style="font-size:10px;color:var(--muted);margin-top:2px;">• ${n}</div>`).join("")}
      </details>` : "";

  return `
    <div class="val-card">
      <div class="val-header">
        <div>
          <div style="font-size:11px;color:var(--muted);text-transform:uppercase;
                      letter-spacing:0.06em;margin-bottom:2px;">Intrinsic Value Consensus</div>
          <div class="val-consensus" style="color:${cc};">${data.consensus}
            ${simpleMode ? `<span style="font-size:11px;font-weight:500;
              padding:2px 7px;border-radius:4px;margin-left:8px;vertical-align:middle;
              background:rgba(241,196,15,0.15);color:var(--yellow);border:1px solid rgba(241,196,15,0.3);">
              Simple estimates</span>` : ""}
          </div>
          <div class="val-counts">
            ${counts.undervalued ?? 0} undervalued ·
            ${counts.fairly_valued ?? 0} fair ·
            ${counts.overvalued ?? 0} overvalued
          </div>
          ${igHtml}${roicHtml}${fcfHtml}${subHtml}
        </div>
        <div style="margin-left:auto;text-align:right;">${macroHtml}</div>
      </div>

      <div style="margin-bottom:8px;font-size:11px;">${gSources}</div>
      ${posteriorHtml}

      <table style="font-size:12px;margin-top:8px;">
        <thead><tr>
          <th>Method</th><th>Fair Value</th><th>Range / Growth</th>
          <th>Verdict</th><th>vs Price</th>
        </tr></thead>
        <tbody>${methodRows}</tbody>
      </table>

      ${sensHtml}
      ${diagHtml}
    </div>`;
}

function injectValuation(data) {
  const el = document.getElementById("valuation-slot");
  if (el) el.innerHTML = renderValuation(data);
}

// ── Insider panel ────────────────────────────────────────────────────────────

function moneyShort(n) {
  if (!n) return "$0";
  if (n >= 1e9) return "$" + (n / 1e9).toFixed(2) + "B";
  if (n >= 1e6) return "$" + (n / 1e6).toFixed(1) + "M";
  if (n >= 1e3) return "$" + (n / 1e3).toFixed(0) + "K";
  return "$" + n;
}

function renderInsiderPeriod(label, data) {
  const buyCt  = data.buys.count  || 0;
  const sellCt = data.sells.count || 0;
  const buyAmt  = data.buys.amount  || 0;
  const sellAmt = data.sells.amount || 0;
  const maxAmt  = Math.max(buyAmt, sellAmt, 1);
  const buyPct  = Math.round((buyAmt  / maxAmt) * 100);
  const sellPct = Math.round((sellAmt / maxAmt) * 100);

  let signal = "", sigClass = "neutral";
  if (buyAmt > 0 && sellAmt === 0)         { signal = "Bullish"; sigClass = "bullish"; }
  else if (sellAmt > 0 && buyAmt === 0)    { signal = "Bearish"; sigClass = "bearish"; }
  else if (buyAmt > sellAmt * 1.5)         { signal = "Bullish lean"; sigClass = "bullish"; }
  else if (sellAmt > buyAmt * 1.5)         { signal = "Bearish lean"; sigClass = "bearish"; }
  else if (buyAmt === 0 && sellAmt === 0)  { signal = "No activity"; sigClass = "neutral"; }
  else                                      { signal = "Mixed"; sigClass = "neutral"; }

  return `
    <div class="insider-period">
      <h4>${label}</h4>
      <div class="ins-row">
        <span class="ins-label" style="color:var(--green);">Buys</span>
        <div class="ins-bar-wrap">
          <div class="ins-bar buy" style="width:${buyPct}%"></div>
        </div>
        <span class="ins-amt">${moneyShort(buyAmt)}</span>
        <span class="ins-count">(${buyCt})</span>
      </div>
      <div class="ins-row">
        <span class="ins-label" style="color:var(--red);">Sells</span>
        <div class="ins-bar-wrap">
          <div class="ins-bar sell" style="width:${sellPct}%"></div>
        </div>
        <span class="ins-amt">${moneyShort(sellAmt)}</span>
        <span class="ins-count">(${sellCt})</span>
      </div>
      <div class="ins-signal ${sigClass}">${signal}</div>
    </div>`;
}

function renderInsider(data) {
  if (!data) return `<div class="insider-loading">No insider data.</div>`;
  const errors = data.errors || [];
  const periods = [
    ["Weekly",    data.weekly],
    ["Monthly",   data.monthly],
    ["Quarterly", data.quarterly],
  ].filter(([, d]) => d);

  return `
    <div class="insider-grid">
      ${periods.map(([lbl, d]) => renderInsiderPeriod(lbl, d)).join("")}
    </div>
    ${errors.length
      ? `<div class="hint" style="color:var(--red);">${errors.join(" | ")}</div>`
      : ""}`;
}

function injectInsider(data) {
  const el = document.getElementById("insider-slot");
  if (el) el.innerHTML = renderInsider(data);
}

// ── Superinvestors table ─────────────────────────────────────────────────────

function renderSuperinvestors(data) {
  if (!data || data.error) {
    return `<div class="hint" style="color:var(--red);">
      ${data ? data.error : "No data"}</div>`;
  }
  const holders = data.holders || [];
  if (!holders.length) return `<div class="hint">No superinvestor holdings found.</div>`;

  const rows = holders.map(h => {
    const cls = h.activity_type === "buy" ? "buy-row"
              : h.activity_type === "sell" ? "sell-row" : "hold-row";
    return `<tr class="${cls}">
      <td>${h.manager}</td>
      <td class="num">${h.pct_portfolio.toFixed(2)}%</td>
      <td>${h.activity}</td>
      <td class="num">${moneyFmt(h.value)}</td>
    </tr>`;
  }).join("");

  const s = data.summary || {};
  const bought = s.total_bought_value || 0;
  const sold   = s.total_sold_value   || 0;
  const buyCt  = s.buy_count  || 0;
  const sellCt = s.sell_count || 0;
  const holdCt = s.hold_count || 0;

  return `
    <div class="super-wrap">
      <table>
        <thead><tr>
          <th>Portfolio Manager</th>
          <th>% of Portfolio</th>
          <th>Recent Activity</th>
          <th>Value</th>
        </tr></thead>
        <tbody>${rows}</tbody>
        <tfoot><tr>
          <td>Total — ${buyCt} buying, ${sellCt} reducing, ${holdCt} no change</td>
          <td></td>
          <td>
            <span class="bought">▲ Bought ${moneyFmt(bought)}</span>
            &nbsp;&nbsp;
            <span class="sold">▼ Sold ${moneyFmt(sold)}</span>
          </td>
          <td></td>
        </tr></tfoot>
      </table>
    </div>`;
}

function injectSuperinvestors(data) {
  const el = document.getElementById("super-slot");
  if (el) el.innerHTML = renderSuperinvestors(data);
}

// Legacy renderers kept for completeness (not wired to any button now).
function renderSingle(data) {
  const snap = data.snapshot || {};
  const inner = data.result || {};
  const results = inner.results || [];
  const used = data.framework_used;
  const autoTag = data.framework_auto_detected
    ? `<span class="badge auto">auto</span>`
    : `<span class="badge">forced</span>`;

  const rows = results.map(r => `
    <tr>
      <td>${r.id}</td>
      <td>${r.name || ""}</td>
      <td class="${statusClass(r.status)}">${r.status || ""}</td>
      <td class="num">${r.earned ?? ""}/${r.weight ?? ""}</td>
      <td>${(r.note || "").replace(/</g, "&lt;")}</td>
    </tr>
  `).join("");

  const bonuses = (inner.bonuses_applied || []).map(b =>
    `<span class="badge">+${b.points} ${b.name}</span>`
  ).join(" ");

  const vetoes = (inner.vetoes_triggered || []).map(v =>
    `<span class="badge" style="border-color: var(--red); color: var(--red);">
      veto: ${v.name || v}
     </span>`).join(" ");

  return `
    <div class="meta">
      <div class="meta-item"><b>Ticker</b>${data.ticker}</div>
      <div class="meta-item"><b>Name</b>${snap.name || "—"}</div>
      <div class="meta-item"><b>Market Cap</b>${moneyFmt(snap.market_cap)}
         <span class="badge" style="margin-left:6px;">${snap.market_cap_band}</span>
      </div>
      <div class="meta-item"><b>Sector</b>${snap.sector || "—"}</div>
      <div class="meta-item"><b>Framework</b>${used.toUpperCase()} ${autoTag}</div>
      <div class="meta-item"><b>Profile</b>${inner.profile || "—"}</div>
    </div>

    <div class="verdict-block">
      <div>
        <div style="font-size:11px;color:var(--muted);
                    text-transform:uppercase;letter-spacing:0.08em;">Verdict</div>
        <div class="verdict-label">${inner.verdict || "n/a"}</div>
      </div>
      <div style="margin-left:auto;text-align:right;">
        <div style="font-size:11px;color:var(--muted);
                    text-transform:uppercase;letter-spacing:0.08em;">Score</div>
        <div class="score-big">
          ${inner.score ?? "—"}<span class="score-max"> / ${inner.max_score || 100}</span>
        </div>
        <div class="hint">passes: ${inner.pass_count ?? "—"}</div>
      </div>
    </div>

    ${bonuses ? `<div class="section-h">Bonuses</div>${bonuses}` : ""}
    ${vetoes ? `<div class="section-h">Vetoes</div>${vetoes}` : ""}

    <div class="section-h">Per-filter breakdown</div>
    <table>
      <thead><tr>
        <th>ID</th><th>Filter</th><th>Status</th>
        <th>Earned/Weight</th><th>Note</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>

    <details style="margin-top:14px;">
      <summary>Raw JSON</summary>
      <pre class="raw">${JSON.stringify(data, null, 2)
        .replace(/</g, "&lt;")}</pre>
    </details>
  `;
}

function renderProfiles(data) {
  const snap = data.snapshot || {};
  const fwUsed = data.framework_used;
  const profiles = data.profiles || {};

  // Sort by score desc; keep errors at bottom
  const entries = Object.entries(profiles).sort((a, b) => {
    const sa = a[1]?.result?.score ?? -1;
    const sb = b[1]?.result?.score ?? -1;
    return sb - sa;
  });

  const rows = entries.map(([prof, run]) => {
    if (run.error) {
      return `<tr>
        <td><b>${prof}</b></td>
        <td colspan="4" class="status-fail">${run.error}</td>
      </tr>`;
    }
    const r = run.result || {};
    const cls = statusClass(r.verdict || "");
    const veto = (r.vetoes_triggered || []).length
      ? `<span class="badge" style="border-color:var(--red);color:var(--red);">veto</span>`
      : "";
    const bonus = (r.bonuses_applied || []).length
      ? `<span class="badge">+${r.bonuses_applied.reduce((s,b)=>s+(b.points||0),0)}</span>`
      : "";
    return `<tr>
      <td><b>${prof}</b></td>
      <td class="${cls}">${r.verdict || "—"}</td>
      <td class="num">${r.score ?? "—"}</td>
      <td class="num">${r.pass_count ?? "—"}/10</td>
      <td>${veto} ${bonus}</td>
    </tr>`;
  }).join("");

  return `
    <div class="meta">
      <div class="meta-item"><b>Ticker</b>${data.ticker}</div>
      <div class="meta-item"><b>Name</b>${snap.name || "—"}</div>
      <div class="meta-item"><b>Market Cap</b>${moneyFmt(snap.market_cap)}
        <span class="badge" style="margin-left:6px;">${snap.market_cap_band}</span>
      </div>
      <div class="meta-item"><b>Framework</b>${fwUsed.toUpperCase()}
        <span class="badge ${data.framework_auto_detected ? "auto" : ""}">
          ${data.framework_auto_detected ? "auto" : "forced"}
        </span>
      </div>
    </div>

    <div class="section-h">All profiles for ${fwUsed.toUpperCase()}
      (sorted by score)</div>
    <table>
      <thead><tr>
        <th>Profile</th><th>Verdict</th><th>Score</th>
        <th>Passes</th><th>Flags</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>

    <details style="margin-top:14px;">
      <summary>Raw JSON</summary>
      <pre class="raw">${JSON.stringify(data, null, 2)
        .replace(/</g, "&lt;")}</pre>
    </details>
  `;
}

function renderAll(data) {
  const snap = data.snapshot || {};
  const suggested = data.suggested_framework;

  const cards = Object.entries(data.frameworks).map(([fw, run]) => {
    const suggestedTag = fw === suggested
      ? `<span class="fw-suggested-tag">(suggested)</span>` : "";
    if (run.error) {
      return `<div class="fw-card ${fw === suggested ? "suggested" : ""}">
        <h3>${fw}${suggestedTag}</h3>
        <div class="err">${run.error}</div>
      </div>`;
    }
    const inner = run.result || {};
    const cls = statusClass(inner.verdict || "");
    return `
      <div class="fw-card ${fw === suggested ? "suggested" : ""}">
        <h3>${fw}${suggestedTag}</h3>
        <div class="${cls}" style="font-size:16px;font-weight:600;">
          ${inner.verdict || "—"}
        </div>
        <div style="margin-top:6px;">
          <span class="score-big" style="font-size:22px;">
            ${inner.score ?? "—"}
          </span>
          <span class="score-max">/ ${inner.max_score || 100}</span>
        </div>
        <div class="hint">profile: ${inner.profile || "—"} ·
          passes: ${inner.pass_count ?? "—"}</div>
      </div>
    `;
  }).join("");

  return `
    <div class="meta">
      <div class="meta-item"><b>Ticker</b>${data.ticker}</div>
      <div class="meta-item"><b>Name</b>${snap.name || "—"}</div>
      <div class="meta-item"><b>Market Cap</b>${moneyFmt(snap.market_cap)}
        <span class="badge" style="margin-left:6px;">${snap.market_cap_band}</span>
      </div>
      <div class="meta-item"><b>Suggested</b>${suggested.toUpperCase()}</div>
    </div>

    <div class="section-h">All frameworks</div>
    <div class="frameworks-grid">${cards}</div>

    <details style="margin-top:14px;">
      <summary>Raw JSON</summary>
      <pre class="raw">${JSON.stringify(data, null, 2)
        .replace(/</g, "&lt;")}</pre>
    </details>
  `;
}

async function run(endpoint, renderer) {
  const payload = gatherPayload();
  if (!payload.ticker) {
    $("results").innerHTML =
      `<div class="err">Enter a ticker first.</div>`;
    return;
  }
  $("results").classList.remove("results-empty");
  $("results").innerHTML =
    `<div><span class="spinner"></span> Running ${payload.ticker}…</div>`;
  $("btn-run").disabled = true;
  $("btn-all").disabled = true;
  try {
    const r = await fetch(endpoint, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload),
    });
    const body = await r.json();
    if (!body.ok) {
      $("results").innerHTML =
        `<div class="err">${body.error || "error"}\n\n${body.trace || ""}</div>`;
      return;
    }
    $("results").innerHTML = renderer(body.data);
  } catch (e) {
    $("results").innerHTML = `<div class="err">${e}</div>`;
  } finally {
    $("btn-run").disabled = false;
    $("btn-all").disabled = false;
  }
}

async function refreshCacheStats() {
  try {
    const r = await fetch("/api/cache/stats");
    const s = await r.json();
    if (s.entries) {
      $("cache-stats").textContent =
        `cache: ${s.entries} entries, oldest expires in ${s.oldest_remaining_seconds}s`;
    } else {
      $("cache-stats").textContent = "cache: empty";
    }
  } catch {}
}

async function clearCache() {
  await fetch("/api/cache/clear", { method: "POST" });
  refreshCacheStats();
}

// Cache the last response so row-clicks can re-render without refetching.
let LAST_RUN = null;

async function runCombined() {
  const payload = gatherPayload();
  if (!payload.ticker) {
    $("results").innerHTML = `<div class="err">Enter a ticker first.</div>`;
    return;
  }
  $("results").classList.remove("results-empty");
  $("results").innerHTML =
    `<span class="spinner"></span> Running ${payload.ticker} across all profiles…`;
  $("btn-run").disabled = true;

  // Fire screener + insider fetch in parallel
  const screenerPromise = fetch("/api/compare-profiles", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(payload),
  }).then(r => r.json());

  const insiderPromise = fetch(`/api/insider/${payload.ticker}`)
    .then(r => r.json())
    .catch(() => null);

  const superPromise = fetch(`/api/superinvestors/${payload.ticker}`)
    .then(r => r.json())
    .catch(() => null);

  const valuationPromise = fetch(`/api/valuation/${payload.ticker}`)
    .then(r => r.json())
    .catch(() => null);

  try {
    const body = await screenerPromise;
    if (!body.ok) {
      $("results").innerHTML =
        `<div class="err">${body.error || "error"}\n\n${body.trace || ""}</div>`;
      return;
    }
    LAST_RUN = body.data;
    $("results").innerHTML = renderRun(body.data, payload.profile);
    bindProfileRowClicks(payload.profile);

    // Valuation, insider + superinvestor data resolve independently
    valuationPromise.then(val => {
      injectValuation(val && val.ok ? val.data : null);
    });
    insiderPromise.then(ins => {
      injectInsider(ins && ins.ok ? ins.data : null);
    });
    superPromise.then(sup => {
      injectSuperinvestors(sup && sup.ok ? sup.data : null);
    });
  } catch (e) {
    $("results").innerHTML = `<div class="err">${e}</div>`;
  } finally {
    $("btn-run").disabled = false;
    refreshCacheStats();
  }
}

function bindProfileRowClicks(initialProfile) {
  document.querySelectorAll(".prof-row").forEach(tr => {
    tr.addEventListener("click", () => {
      const p = tr.getAttribute("data-prof");
      if (!LAST_RUN) return;
      $("results").innerHTML = renderRun(LAST_RUN, p);
      bindProfileRowClicks(p);
    });
  });
}

document.addEventListener("DOMContentLoaded", () => {
  loadConfig();
  refreshCacheStats();
  $("framework").addEventListener("change", onFrameworkChange);
  $("btn-run").addEventListener("click", runCombined);
  $("btn-clear-cache").addEventListener("click", () => {
    LAST_RUN = null;
    clearCache();
  });
  $("ticker").addEventListener("keydown", (e) => {
    if (e.key === "Enter") { e.preventDefault(); $("btn-run").click(); }
  });
});
</script>
</body>
</html>
